<header class="d-flex align-items-center justify-content-between px-4 py-2 bg-primary text-white">

  <span class="fw-bold fs-5">Mini CRM</span>

  <button
    *ngIf="isAuthenticated"
    type="button"
    class="btn btn-outline-light btn-sm"
    (click)="logout()">
    Déconnexion
  </button>

  <a
    *ngIf="!isAuthenticated"
    routerLink="/auth"
    class="btn btn-outline-light btn-sm">
    Connexion
  </a>

</header>
