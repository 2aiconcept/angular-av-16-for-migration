<form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>

  <div class="mb-3">
    <label for="nom" class="form-label">Nom <span class="text-danger" aria-hidden="true">*</span></label>
    <input
      id="nom"
      type="text"
      class="form-control"
      formControlName="nom"
      aria-required="true"
      [attr.aria-describedby]="form.get('nom')?.invalid && form.get('nom')?.touched ? 'nom-error' : null">
    <div
      *ngIf="form.get('nom')?.invalid && form.get('nom')?.touched"
      id="nom-error"
      class="form-text text-danger"
      role="alert">
      Le nom est requis.
    </div>
  </div>

  <div class="mb-3">
    <label for="secteur" class="form-label">Secteur</label>
    <input
      id="secteur"
      type="text"
      class="form-control"
      formControlName="secteur">
  </div>

  <div class="mb-3">
    <label for="adresse" class="form-label">Adresse</label>
    <input
      id="adresse"
      type="text"
      class="form-control"
      formControlName="adresse">
  </div>

  <div class="mb-4">
    <label for="telephone" class="form-label">Téléphone</label>
    <input
      id="telephone"
      type="tel"
      class="form-control"
      formControlName="telephone">
  </div>

  <div class="d-flex gap-2 justify-content-end">
    <button
      type="button"
      class="btn btn-secondary"
      (click)="formCancel.emit()">
      Annuler
    </button>
    <button
      type="submit"
      class="btn btn-primary"
      [disabled]="isLoading">
      <span *ngIf="isLoading" class="spinner-border spinner-border-sm me-2" aria-hidden="true"></span>
      {{ isLoading ? 'Enregistrement...' : 'Enregistrer' }}
    </button>
  </div>

</form>
