<div class="table-responsive">
  <table class="table table-striped table-hover align-middle mb-0">
    <thead class="table-dark">
      <tr>
        <th scope="col">Nom</th>
        <th scope="col">Secteur</th>
        <th scope="col">Adresse</th>
        <th scope="col">Téléphone</th>
        <th scope="col" class="text-end">Actions</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let company of companies">
        <td class="fw-semibold">{{ company.nom }}</td>
        <td>{{ company.secteur || '—' }}</td>
        <td>{{ company.adresse || '—' }}</td>
        <td>{{ company.telephone || '—' }}</td>
        <td class="text-end">
          <div class="d-flex justify-content-end gap-2">
            <a
              [routerLink]="['/companies', company.id, 'edit']"
              class="btn btn-outline-secondary btn-sm"
              [attr.aria-label]="'Modifier ' + company.nom">
              ✏️
            </a>
            <button
              type="button"
              class="btn btn-danger btn-sm"
              [attr.aria-label]="'Supprimer ' + company.nom"
              (click)="companyDelete.emit(company.id)">
              Supprimer
            </button>
          </div>
        </td>
      </tr>
      <tr *ngIf="companies.length === 0">
        <td colspan="5" class="text-center text-muted py-4">
          Aucune entreprise trouvée.
        </td>
      </tr>
    </tbody>
  </table>
</div>
