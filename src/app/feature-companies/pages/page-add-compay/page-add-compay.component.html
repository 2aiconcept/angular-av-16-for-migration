<div class="p-4">

  <div class="d-flex align-items-center gap-2 mb-4">
    <h1 class="fs-4 fw-bold mb-0">Nouvelle entreprise</h1>
  </div>

  @if (errorMessage) {
    <div class="alert alert-danger" role="alert" aria-live="polite">
      {{ errorMessage }}
    </div>
  }

  <div class="card shadow-sm" style="max-width: 600px;">
    <div class="card-body">
      <app-form-company
        [isLoading]="isLoading"
        (formSubmit)="onSubmit($event)"
        (formCancel)="onCancel()">
      </app-form-company>
    </div>
  </div>

</div>
